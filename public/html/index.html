<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../style.css">
  <title>トップページ</title>
  <!-- Socket.io はサーバーから提供される -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- xterm.js はローカルファイル -->
  <link rel="stylesheet" href="../lib/xterm/xterm.css">
  <script src="../lib/xterm/xterm.min.js"></script>
  <!-- Chart.js for pie chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <!-- Leaflet（オープンソースの地図ライブラリ、APIキー不要） -->
  <!-- CSSとJSはquiz.jsで動的に読み込む -->
  <style>
    .hidden { display: none; }
    .tabs { display: flex; margin-bottom: 10px; }
    .tab { padding: 10px 20px; cursor: pointer; border: 1px solid #000000; border-bottom: none; background: #fcfcfc; }
    .tab.active { background: rgb(255, 255, 255); font-weight: bold; }
    .tab-content { border: 1px solid #aaa; padding: 15px; display: none; }
    .tab-content.active { display: block; }
    
    /* sad server用のスタイル */
    #sad-terminal-container { margin-top: 20px; }
    #sad-scenario-select { 
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #5a5abf;
      border-radius: 6px;
      background-color: #2d3035;
      color: white;
    }
    #sad-start-btn {
      padding: 8px 16px;
      background-color: #0078ff;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #sad-start-btn:hover { background-color: #005ecb; }
    #sad-terminal { 
      width: 100%; 
      height: 400px; 
      background: #000; 
      margin-top: 10px;
      position: relative;
    }
    /* xterm.jsのスクロールバーを表示 */
    #sad-terminal .xterm-viewport {
      overflow-y: auto !important;
      overflow-x: hidden !important;
    }
    #sad-terminal .xterm-scroll-area {
      overflow-y: auto !important;
    }
    /* xterm.jsのスクロールバーのスタイル */
    #sad-terminal .xterm-viewport::-webkit-scrollbar {
      width: 10px;
    }
    #sad-terminal .xterm-viewport::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    #sad-terminal .xterm-viewport::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 5px;
    }
    #sad-terminal .xterm-viewport::-webkit-scrollbar-thumb:hover {
      background: #777;
    }
  </style>
</head>

<body>
  <!-- ログインフォーム -->
  <div id="loginSection">
    <form id="loginForm">
      <h1>ログインページ</h1>
      <label>ユーザーID: <input type="text" name="userid" required></label><br>

      <label>パスワード: <input type="password" name="password" required></label><br>

      <button type="submit">ログイン</button>
    </form>
    <p id="loginMessage"></p>

    <p>新規登録は<a href='register_form.html'>こちら</a></p>
  </div>

  <!-- ログイン後に見える部分 -->
  <div id="mainSection" class="hidden">
    <div style="display: grid; grid-template-columns: minmax(260px, 1fr) auto minmax(260px, 1fr); align-items: center; margin-bottom: 20px; gap: 12px;">
      <div style="display: flex; gap: 10px; align-items: center; min-width: 260px;">
        <a
          href="/tutor"
          target="_blank"
          rel="noopener noreferrer"
          style="display: inline-block; padding: 10px 14px; border-radius: 8px; text-decoration: none; color: #fff; background: #2f7cf6; font-weight: 600;"
        >Tutorに質問する</a>
        <button id="logoutBtn" style="margin:0;">ログアウト</button>
      </div>
      <h2 id="welcome" style="margin: 0; text-align: center; white-space: nowrap;"></h2>
      <div style="display: flex; justify-content: flex-end; min-width: 260px;">
        <a id="mypageIcon" href="/mypage" target="_blank" class="mypage-icon" title="マイページ" style="width: 48px;">
          <img id="userIconImg" src="" alt="ユーザーアイコン" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none;">
          <span id="userIconDefault">👤</span>
        </a>
      </div>
    </div>

    <p>初めての方は<a href="/html/pre.html">こちら</a></p>
    <p>管理者の方は<a href="/admin">こちら</a></p>
    
    <!--タブ選択-->
    <div class="tabs">
      <div class="tab active" data-target="quiz">難易度別</div>
      <div class="tab" data-target="category">カテゴリー別</div>
      <div class="tab" data-target="code-editor">コードエディタ</div>
      <div class="tab" data-target="score">得点</div>
      <div class="tab" data-target="result_check">ランキング</div>
      <div class="tab" data-target="achievements">実績</div>
    </div>

  <!--タブの内容-->
  <div id="quiz" class="tab-content active">
    <div id="quizContainer"></div>
  </div>

  <!-- カテゴリー別（ジャンル）問題一覧 -->
  <div id="category" class="tab-content">
    <div id="categoryQuizContainer"></div>
  </div>

  <!--得点表示-->
  <div id="score" class="tab-content">
    <h2>得点</h2>
    <p id="scoreDisplay">現在の得点: -</p>
    <p id="studyTimeDisplay">学習時間: -</p>
    <button id="scoreRefresh">最新スコア取得</button>
    <div style="margin-top: 30px; text-align: center;">
      <h3>カテゴリー別解答状況</h3>
      <canvas id="categoryChart" style="max-width: 500px; max-height: 500px; margin: 0 auto; display: block;"></canvas>
    </div>
  </div>

  <!--ランキング表示-->
  <div id="result_check" class="tab-content">
    <h2>ランキング</h2>
    <table id="ranking">
    <thead>
      <tr><th>順位</th><th>ユーザー名</th><th>スコア</th></tr>
    </thead>
    <tbody>
        
    </tbody>
    </table>
  </div>

  <!--コードエディタ-->
  <div id="code-editor" class="tab-content">
    <h2>コードエディタ</h2>
    <div style="margin-bottom: 15px;">
      <label for="code-language-select" style="margin-right: 10px; color: #333; font-weight: 600;">言語:</label>
      <select id="code-language-select" style="padding: 8px 12px; border: 2px solid #667eea; border-radius: 8px; background: white; color: #333; font-size: 14px; cursor: pointer;">
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
        <option value="c">C</option>
        <option value="cpp">C++</option>
        <option value="java">Java</option>
      </select>
      <button id="code-run-btn" style="margin-left: 15px;">実行</button>
      <button id="code-clear-btn" style="margin-left: 10px; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">クリア</button>
    </div>
    <div id="code-editor-container" style="width: 100%; height: 500px; border: 2px solid #667eea; border-radius: 8px; overflow: hidden;"></div>
    <div style="margin-top: 20px;">
      <h3 style="color: #333; margin-bottom: 10px;">出力</h3>
      <div id="code-output"></div>
    </div>
  </div>

  <!--実績表示-->
  <div id="achievements" class="tab-content">
    <h2>実績</h2>
    <div id="achievementsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
      <!-- 実績がここに動的に追加されます -->
    </div>
  </div>

  <!-- 問題モーダル（タブの外：非アクティブな .tab-content は display:none のため、その子だと表示されない） -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <p><strong>得点:</strong> <span id="modal-point"></span> 点</p>
      <details>
        <summary>ヒント</summary>
        <div id="modal-hints"></div>
      </details>

      <div id="modal-files"></div>

      <div id="sad-terminal-container" style="display: none;">
        <label>
          難易度:
          <select id="sad-scenario-select">
            <option value="easy1">Easy 1</option>
            <option value="easy2">Easy 2</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="test1">Test 1</option>
          </select>
        </label>
        <button id="sad-start-btn">シナリオを開始</button>
        <div id="sad-terminal"></div>
      </div>

      <hr>

      <div id="map-container" style="display: none; margin: 15px 0;">
        <div id="map" style="width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 5px;"></div>
        <div style="margin-top: 10px;">
          <p style="margin: 5px 0; font-size: 14px;">地図をクリックして座標を選択、または下の入力欄に直接座標を入力してください</p>
          <p id="selected-coords" style="margin: 5px 0; color: #0078ff; font-weight: bold;"></p>
        </div>
      </div>

      <input type="text" id="answer" placeholder="FLAG{...}">
      <button id="submitBtn">送信</button>
      <p id="result"></p>
      <div id="explanation-link" style="display: none; margin-top: 10px;">
        <a id="explanation-link-anchor" href="#" target="_blank" style="color: #0078ff; text-decoration: underline;">詳しい解説はこちら</a>
      </div>
    </div>
  </div>
  </div>

</body>
<script type="module" src="../js/main.js"></script>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="../style.css">
  <title>AI先生</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #1a1a1a;
      color: #e0e0e0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #4a9eff;
      margin-bottom: 10px;
    }
    .status-bar {
      background-color: #2d2d2d;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: #4caf50;
    }
    .status-indicator.error {
      background-color: #f44336;
    }
    .status-indicator.warning {
      background-color: #ff9800;
    }
    .chat-container {
      background-color: #2d2d2d;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      position: relative;
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.6;
      text-align: left;
    }
    .message.user {
      background-color: #4a9eff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }
    .message.assistant {
      background-color: #3d3d3d;
      color: #e0e0e0;
      align-self: flex-start;
    }
    .message.user::after,
    .message.assistant::before {
      content: '';
      position: absolute;
      top: 12px;
      width: 10px;
      height: 10px;
      background: inherit;
      transform: rotate(45deg);
    }
    .message.user::after {
      right: -5px;
      border-radius: 0 2px 0 0;
    }
    .message.assistant::before {
      left: -5px;
      border-radius: 2px 0 0 0;
    }
    .message .message-meta {
      display: block;
      margin-bottom: 4px;
      font-size: 0.8em;
      opacity: 0.85;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .message .message-body {
      display: block;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message .message-body strong {
      font-weight: 700;
    }
    .message .sources {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #555;
      font-size: 0.85em;
      color: #aaa;
    }
    .input-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-container textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #555;
      border-radius: 6px;
      background-color: #2d2d2d;
      color: #e0e0e0;
      font-size: 14px;
      resize: vertical;
      min-height: 60px;
    }
    .input-container textarea:focus {
      outline: none;
      border-color: #4a9eff;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.3s;
    }
    .btn-primary {
      background-color: #4a9eff;
      color: white;
    }
    .btn-primary:hover {
      background-color: #357abd;
    }
    .btn-primary:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    .btn-secondary {
      background-color: #555;
      color: white;
    }
    .btn-secondary:hover {
      background-color: #666;
    }
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .quick-action-btn {
      padding: 8px 16px;
      background-color: #3d3d3d;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .quick-action-btn:hover {
      background-color: #4d4d4d;
    }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #4a9eff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-message {
      background-color: #f44336;
      color: white;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI先生</h1>
      <p>CTFの問題で困ったら、AI先生に質問してみましょう！</p>
    </div>

    <div class="status-bar" id="statusBar">
      <div class="status-item">
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">初期化中...</span>
      </div>
      <button class="btn btn-secondary" onclick="clearHistory()">会話履歴をクリア</button>
    </div>

    <div id="errorMessage" class="error-message hidden"></div>

    <div class="quick-actions">
      <button class="quick-action-btn" onclick="askQuickQuestion('問題の解き方を教えてください')">
        💡 解き方を聞く
      </button>
      <button class="quick-action-btn" onclick="askQuickQuestion('使用すべきツールを教えてください')">
        🛠️ ツールを聞く
      </button>
      <button class="quick-action-btn" onclick="askQuickQuestion('このカテゴリーの基礎知識を教えてください')">
        📚 基礎知識を聞く
      </button>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="message assistant">
        <span class="message-meta">AI先生</span>
        <span class="message-body">こんにちは！CTFの問題で困ったことがあれば、何でも質問してください。直接的な答えは教えませんが、ヒントや考え方を一緒に考えましょう！</span>
      </div>
    </div>

    <div class="input-container">
      <textarea 
        id="questionInput" 
        placeholder="質問を入力してください（例: ROT13暗号の解き方を教えてください）"
        rows="3"
      ></textarea>
      <button class="btn btn-primary" id="sendBtn" onclick="sendQuestion()">送信</button>
    </div>
  </div>

  <script>
    let currentCategory = null;
    let currentQuestionId = null;
    let statusPollTimer = null;

    // ページ読み込み時にステータスを確認し、準備完了までポーリング
    window.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      currentCategory = urlParams.get('category');
      currentQuestionId = urlParams.get('questionId');
      await checkStatusAndPoll();
    });

    // Enterキーで送信（Shift+Enterで改行）
    document.getElementById('questionInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
      }
    });

    /** ステータスを取得して表示を更新する。準備完了なら true を返す。 */
    async function checkStatus() {
      try {
        const response = await fetch('/tutor/status', {
          credentials: 'include'
        });
        const status = await response.json();
        
        const indicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        
        if (status.ready) {
          if (statusPollTimer) {
            clearInterval(statusPollTimer);
            statusPollTimer = null;
          }
          indicator.className = 'status-indicator';
          statusText.textContent = `準備完了 (ローカルLLM: ${status.ollamaModel}, 知識ベース: ${status.knowledgeBaseCount}件)`;
          return true;
        }
        
        if (!status.llmReady) {
          indicator.className = 'status-indicator warning';
          statusText.textContent = `⚠️ Ollamaが起動していません (${status.ollamaBaseUrl})`;
        } else if (!status.embeddingReady) {
          indicator.className = 'status-indicator warning';
          statusText.textContent = '埋め込みモデルを初期化中...';
        } else if (!status.knowledgeBaseInitialized) {
          indicator.className = 'status-indicator warning';
          statusText.textContent = '知識ベースを初期化中...';
        } else {
          indicator.className = 'status-indicator error';
          statusText.textContent = 'エラーが発生しています';
        }
        return false;
      } catch (error) {
        console.error('ステータス確認エラー:', error);
        document.getElementById('statusIndicator').className = 'status-indicator error';
        document.getElementById('statusText').textContent = 'ステータス確認エラー';
        return false;
      }
    }

    /** ステータスを確認し、準備完了まで2秒ごとにポーリングする */
    async function checkStatusAndPoll() {
      const ready = await checkStatus();
      if (ready || statusPollTimer) return;
      statusPollTimer = setInterval(async () => {
        const isReady = await checkStatus();
        if (isReady && statusPollTimer) {
          clearInterval(statusPollTimer);
          statusPollTimer = null;
        }
      }, 2000);
    }

    /** ストリーミング用の空の AI メッセージ行を追加し、body / 参考資料用要素を返す */
    function addStreamingAssistantMessage() {
      const container = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      const meta = document.createElement('span');
      meta.className = 'message-meta';
      meta.textContent = 'AI先生';
      const body = document.createElement('span');
      body.className = 'message-body';
      body.innerHTML = '<span class="loading"></span> 考え中...';
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      sourcesEl.style.display = 'none';
      messageDiv.appendChild(meta);
      messageDiv.appendChild(body);
      messageDiv.appendChild(sourcesEl);
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
      return { bodyEl: body, sourcesEl };
    }

    function setAssistantSources(sourcesEl, sources) {
      if (!sources || sources.length === 0) return;
      sourcesEl.style.display = 'block';
      sourcesEl.innerHTML = '<strong>参考資料:</strong> ' +
        sources.map(s => escapeHtml(`${s.category} (関連度: ${s.relevance})`)).join(', ');
    }

    async function sendQuestion() {
      const input = document.getElementById('questionInput');
      const question = input.value.trim();
      
      if (!question) {
        return;
      }

      addMessage('user', question);
      input.value = '';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span> 送信中...';

      const streamRefs = addStreamingAssistantMessage();

      try {
        const response = await fetch('/tutor/ask/stream', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/x-ndjson'
          },
          credentials: 'include',
          body: JSON.stringify({
            question: question,
            category: currentCategory,
            questionId: currentQuestionId
          })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          streamRefs.bodyEl.textContent = errData.message || 'リクエストに失敗しました。';
          showError(errData.message || `HTTP ${response.status}`);
          return;
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.trim()) continue;
            let evt;
            try {
              evt = JSON.parse(line);
            } catch (e) {
              continue;
            }
            if (evt.type === 'sources') {
              setAssistantSources(streamRefs.sourcesEl, evt.sources);
            } else if (evt.type === 'chunk' && evt.text) {
              fullText += evt.text;
              streamRefs.bodyEl.innerHTML = formatAnswerText(fullText);
            } else if (evt.type === 'done') {
              if (evt.answer != null) {
                fullText = evt.answer;
                streamRefs.bodyEl.innerHTML = formatAnswerText(fullText);
              }
            } else if (evt.type === 'error') {
              if (evt.error) showError(evt.error);
              streamRefs.bodyEl.innerHTML = formatAnswerText(evt.answer || 'エラーが発生しました。');
            }
          }
          document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }
      } catch (error) {
        console.error('質問送信エラー:', error);
        streamRefs.bodyEl.textContent = 'エラーが発生しました。もう一度お試しください。';
        showError('エラーが発生しました。もう一度お試しください。');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = '送信';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatAnswerText(content) {
      const escaped = escapeHtml(content);
      const withBreaks = escaped.replace(/\n/g, '<br>');
      return withBreaks.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function addMessage(role, content, sources = []) {
      const container = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const roleName = role === 'user' ? 'あなた' : 'AI先生';
      const displayContent = role === 'assistant'
        ? formatAnswerText(content)
        : escapeHtml(content).replace(/\n/g, '<br>');
      let html = `<span class="message-meta">${roleName}</span><span class="message-body">${displayContent}</span>`;
      
      if (sources && sources.length > 0) {
        html += '<div class="sources">';
        html += '<strong>参考資料:</strong> ';
        html += sources.map(s => escapeHtml(`${s.category} (関連度: ${s.relevance})`)).join(', ');
        html += '</div>';
      }
      
      messageDiv.innerHTML = html;
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
    }

    function askQuickQuestion(question) {
      document.getElementById('questionInput').value = question;
      sendQuestion();
    }

    async function clearHistory() {
      if (!confirm('会話履歴をクリアしますか？')) {
        return;
      }

      try {
        const response = await fetch('/tutor/clear', {
          method: 'POST',
          credentials: 'include'
        });
        
        if (response.ok) {
          const container = document.getElementById('chatContainer');
          container.innerHTML = '<div class="message assistant"><span class="message-meta">AI先生</span><span class="message-body">会話履歴をクリアしました。新しい質問から始めましょう！</span></div>';
        }
      } catch (error) {
        console.error('履歴クリアエラー:', error);
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
      setTimeout(() => {
        errorDiv.classList.add('hidden');
      }, 5000);
    }
  </script>
</body>
</html>

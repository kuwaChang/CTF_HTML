<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="../style.css">
  <title>マイページ</title>
  <style>
    .mypage-container {
      max-width: 800px;
      margin: 50px auto;
      padding: 30px;
      background: rgba(250, 252, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(220, 220, 220, 0.3);
    }

    .mypage-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .mypage-header h1 {
      color: #667eea;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .user-info-section {
      margin-bottom: 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .user-info-section h2 {
      color: #667eea;
      font-size: 24px;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }

    .info-value {
      color: #667eea;
      font-weight: 700;
      font-size: 18px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
      font-size: 18px;
    }

    .error {
      text-align: center;
      padding: 20px;
      background: #f8d7da;
      color: #721c24;
      border-radius: 8px;
      margin: 20px 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    @media (max-width: 768px) {
      .mypage-container {
        margin: 20px;
        padding: 20px;
      }

      .mypage-header h1 {
        font-size: 24px;
      }

      .user-info-section h2 {
        font-size: 20px;
      }

      .info-item {
        flex-direction: column;
        gap: 5px;
      }

      .info-value {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="mypage-container">
    <div class="mypage-header">
      <h1>マイページ</h1>
    </div>

    <div id="loadingMessage" class="loading">
      読み込み中...
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>

    <div id="userInfo" style="display: none;">
      <div class="user-info-section">
        <h2>ユーザー情報</h2>
        <div style="text-align: center; margin-bottom: 30px;">
          <div style="position: relative; display: inline-block;">
            <img id="userIcon" src="" alt="ユーザーアイコン" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #667eea; cursor: pointer; background: #f0f0f0;">
            <label for="iconInput" style="position: absolute; bottom: 0; right: 0; background: #667eea; color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
              <span style="font-size: 20px;">📷</span>
              <input type="file" id="iconInput" accept="image/*" style="display: none;">
            </label>
          </div>
          <p id="iconUploadStatus" style="margin-top: 10px; font-size: 14px; color: #667eea;"></p>
        </div>
        <div class="info-item">
          <span class="info-label">ユーザーID:</span>
          <span class="info-value" id="userid">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">ユーザー名:</span>
          <span class="info-value" id="username">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">スコア:</span>
          <span class="info-value" id="score">-</span>
        </div>
        <div class="info-item">
          <span class="info-label">学習時間:</span>
          <span class="info-value" id="studyTime">-</span>
        </div>
      </div>

      <div class="user-info-section">
        <h2>ユーザー情報の変更</h2>
        
        <div style="margin-bottom: 20px;">
          <label for="usernameInput" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">ユーザー名:</label>
          <input type="text" id="usernameInput" placeholder="新しいユーザー名" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
          <button id="updateUsernameBtn" style="margin-top: 10px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">ユーザー名を更新</button>
          <p id="usernameUpdateStatus" style="margin-top: 10px; font-size: 14px;"></p>
        </div>

        <div style="margin-bottom: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
          <label for="currentPasswordInput" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">現在のパスワード:</label>
          <input type="password" id="currentPasswordInput" placeholder="現在のパスワード" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px;">
          
          <label for="newPasswordInput" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">新しいパスワード:</label>
          <input type="password" id="newPasswordInput" placeholder="新しいパスワード（8文字以上）" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px;">
          
          <label for="confirmPasswordInput" style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">新しいパスワード（確認）:</label>
          <input type="password" id="confirmPasswordInput" placeholder="新しいパスワード（確認）" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
          
          <button id="updatePasswordBtn" style="margin-top: 10px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">パスワードを更新</button>
          <p id="passwordUpdateStatus" style="margin-top: 10px; font-size: 14px;"></p>
        </div>
      </div>
    </div>

    <div style="text-align: center;">
      <a href="/" class="back-link">ホームに戻る</a>
    </div>
  </div>

  <script type="module" src="../js/mypage.js"></script>
</body>
</html>
